<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3-Lane Runner Pro (Cube Edition)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        
        /* UI OVERLAYS */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: yellow;
            z-index: 20;
        }
        
        h1 { font-size: 3rem; text-shadow: 2px 2px red; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: white; margin-bottom: 20px; }
        
        input { 
            padding: 10px; font-size: 1.2rem; text-align: center; 
            border: 2px solid yellow; background: #222; color: white; margin-bottom: 20px;
        }
        
        button {
            padding: 15px 30px; font-size: 1.5rem; 
            background: red; color: white; border: 2px solid white;
            cursor: pointer; font-family: inherit; font-weight: bold;
        }
        button:active { background: darkred; }

        /* HUD (Heads Up Display) */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
            display: none; 
        }
        
        #score-board {
            position: absolute; top: 20px; right: 20px;
            font-size: 1.5rem; color: white; font-weight: bold;
            background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid yellow;
            text-align: right;
        }

        #pause-btn {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.5rem; color: white; background: red;
            width: 50px; height: 50px; line-height: 50px; text-align: center;
            border: 2px solid white; cursor: pointer; pointer-events: auto;
            user-select: none;
        }

        /* Speed Up Notification */
        #speed-notif {
            position: absolute; top: 20%; width: 100%;
            text-align: center; font-size: 2rem; color: yellow; font-weight: bold;
            text-shadow: 2px 2px red; opacity: 0; transition: opacity 0.5s;
        }

        /* --- LEADERBOARD STYLES --- */
        #leaderboard-container {
            margin-top: 20px;
            width: 300px;
            background-color: rgba(20, 20, 20, 0.9); 
            border: 2px solid yellow;
            padding: 15px; 
            color: white;
            text-align: left;
        }
        #leaderboard-container h3 {
            margin: 0 0 10px 0; text-align: center; 
            border-bottom: 1px solid red;
            padding-bottom: 5px; font-size: 1.2rem; color: yellow;
            text-transform: uppercase;
        }
        #lb-list { list-style: none; padding: 0; margin: 0; font-size: 1rem; }
        #lb-list li { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px dashed #444; }
        #lb-list li span.lb-score { color: red; font-weight: bold; }
        .loading-text { text-align: center; color: #888; font-size: 0.8rem; }
        
        #firebase-status { font-size: 0.8rem; margin-top: 5px; color: #555; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1>WALL RUNNER</h1>
        <p>Enter your name, Patriot:</p>
        <input type="text" id="player-name-input" placeholder="Name" maxlength="10">
        <button id="start-btn">START RUN</button>

        <div id="firebase-status">Initializing System...</div>
        
        <div id="leaderboard-container">
            <h3>GLOBAL TOP 5</h3>
            <ul id="lb-list">
                <li class="loading-text">CONNECTING TO DATABASE...</li>
            </ul>
        </div>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <h1 style="color: red;">CRASHED!</h1>
        <p>Runner: <span id="final-name" style="color:yellow"></span></p>
        <p>Distance: <span id="final-score" style="color:white">0</span> Feet</p>
        <p>Max Speed Scale: <span id="final-scale" style="color:white">1.0</span></p>
        <button id="restart-btn">TRY AGAIN</button>
    </div>

    <div id="pause-screen" class="screen hidden">
        <h1>PAUSED</h1>
        <button id="resume-btn">RESUME</button>
    </div>

    <div id="hud">
        <div id="pause-btn">||</div>
        <div id="score-board">
            <div id="dist-display">0 FT</div>
            <div id="speed-display" style="font-size: 0.8rem; color: #aaa;">SPD: 1.0</div>
            <div id="high-score-display" style="font-size: 0.8rem; color: yellow; margin-top:5px;">BEST: 0</div>
        </div>
        <div id="speed-notif">SPEED UP!</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getDatabase, ref, set, get, child, query, orderByChild, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCiRUZZsaBiGKyYGlGc4coI14MG23bzT3g",
            authDomain: "game-dd2e6.firebaseapp.com",
            databaseURL: "https://game-dd2e6-default-rtdb.firebaseio.com",
            projectId: "game-dd2e6",
            storageBucket: "game-dd2e6.firebasestorage.app",
            messagingSenderId: "989207031024",
            appId: "1:989207031024:web:72e77a4cf766e564f66635"
        };

        // --- GAME STATE ---
        let gameState = 'start'; 
        let score = 0;
        let personalBest = 0;
        let playerName = "Player";
        
        let baseSpeed = 0.4;
        let forwardSpeed = baseSpeed;
        let speedScale = 1.0;
        let maxScale = 100.0;
        let nextSpeedThreshold = 150;
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const pauseScreen = document.getElementById('pause-screen');
        const hud = document.getElementById('hud');
        const distDisplay = document.getElementById('dist-display');
        const speedDisplay = document.getElementById('speed-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const speedNotif = document.getElementById('speed-notif');
        const finalNameDisplay = document.getElementById('final-name');
        const finalScoreDisplay = document.getElementById('final-score');
        const finalScaleDisplay = document.getElementById('final-scale');
        const nameInput = document.getElementById('player-name-input');
        const lbList = document.getElementById('lb-list');
        const firebaseStatus = document.getElementById('firebase-status');

        // --- FIREBASE LOGIC ---
        const FB = {
            db: null,
            ready: false,
            init: function() {
                try {
                    const app = initializeApp(firebaseConfig);
                    this.db = getDatabase(app);
                    this.ready = true;
                    firebaseStatus.innerHTML = '<span style="color:green">✓ ONLINE LINK ESTABLISHED</span>';
                    this.listenLeaderboard();
                } catch (e) {
                    console.error(e);
                    firebaseStatus.innerHTML = '<span style="color:red">✗ OFFLINE MODE</span>';
                }
            },
            sanitize: (key) => key.replace(/[.#$[\]\/]/g, "").substring(0, 50),
            submit: function(finalScore) {
                if (!this.ready) return;
                const safeName = playerName.trim() === "" ? "ANONYMOUS" : playerName;
                const key = this.sanitize(safeName);
                const userRef = ref(this.db, `scores/${key}`);
                
                get(userRef).then(snap => {
                    if (!snap.exists() || finalScore > snap.val().score) {
                        set(userRef, { name: safeName, score: finalScore, timestamp: Date.now() });
                    }
                });
            },
            fetchPersonalBest: function() {
                if (!this.ready || !playerName) return;
                const key = this.sanitize(playerName);
                get(child(ref(this.db), `scores/${key}`)).then(snap => {
                    if (snap.exists()) {
                        personalBest = snap.val().score;
                        highScoreDisplay.innerText = "BEST: " + personalBest;
                    }
                });
            },
            listenLeaderboard: function() {
                if (!this.ready) return;
                onValue(query(ref(this.db, 'scores'), orderByChild('score'), limitToLast(5)), (snap) => {
                    const data = snap.val();
                    if (!data) {
                        lbList.innerHTML = "<li>No Data Found</li>";
                        return;
                    }
                    const sorted = Object.values(data).sort((a, b) => b.score - a.score);
                    lbList.innerHTML = sorted.map(e => 
                        `<li>${e.name.substring(0,10)} <span class="lb-score">${e.score}</span></li>`
                    ).join('');
                });
            }
        };

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); 
        scene.fog = new THREE.Fog(0x000000, 30, 90); 

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const cameraOffset = new THREE.Vector3(0, 15, 12); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 30, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 3. OBJECTS ---
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const lineGeo = new THREE.BoxGeometry(0.2, 0.1, 200);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xFFFF00 });
        const lines = [
            new THREE.Mesh(lineGeo, lineMat), 
            new THREE.Mesh(lineGeo, lineMat), 
            new THREE.Mesh(lineGeo, lineMat), 
            new THREE.Mesh(lineGeo, lineMat)  
        ];
        lines[0].position.set(-1.5, 0.05, 0);
        lines[1].position.set(1.5, 0.05, 0);
        lines[2].position.set(-4.5, 0.05, 0);
        lines[3].position.set(4.5, 0.05, 0);
        lines.forEach(l => scene.add(l));

        // --- PLAYER (WHITE CUBE) ---
        const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff }); // Plain White
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.castShadow = true;
        player.position.y = 0.5; // Sitting on ground (height/2)
        scene.add(player);

        const playerBox = new THREE.Box3();

        // Obstacles
        let obstacles = [];
        const obstacleGeo = new THREE.BoxGeometry(1.5, 2, 1.5);
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0xFF0000 });

        // --- 4. LOGIC ---
        let velocityY = 0;
        const gravity = -0.025;
        const jumpStrength = 0.6;
        let isGrounded = true;
        let currentLane = 0; 
        const laneWidth = 3; 

        function startGame() {
            playerName = nameInput.value || "Anonymous";
            FB.fetchPersonalBest();
            resetGame();
            gameState = 'playing';
            startScreen.classList.add('hidden');
            hud.style.display = 'block';
        }

        function resetGame() {
            player.position.set(0, 0.5, 0); // Reset to center lane, on ground
            currentLane = 0;
            velocityY = 0;
            isGrounded = true;
            score = 0;
            speedScale = 1.0;
            nextSpeedThreshold = 150;
            forwardSpeed = baseSpeed;
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            distDisplay.innerText = "0 FT";
            speedDisplay.innerText = "SPD: 1.0";
            gameOverScreen.classList.add('hidden');
            pauseScreen.classList.add('hidden');
        }

        function togglePause() {
            if (gameState === 'playing') {
                gameState = 'paused';
                pauseScreen.classList.remove('hidden');
            } else if (gameState === 'paused') {
                gameState = 'playing';
                pauseScreen.classList.add('hidden');
            }
        }

        function triggerGameOver() {
            gameState = 'gameover';
            hud.style.display = 'none';
            gameOverScreen.classList.remove('hidden');
            finalNameDisplay.innerText = playerName;
            finalScoreDisplay.innerText = score;
            finalScaleDisplay.innerText = speedScale.toFixed(1);
            FB.submit(score);
        }

        function updateSpeed() {
            if (score >= nextSpeedThreshold && speedScale < maxScale) {
                speedScale += 0.5;
                nextSpeedThreshold += 150;
                forwardSpeed = baseSpeed + ((speedScale - 1) * 0.04); 
                speedDisplay.innerText = "SPD: " + speedScale.toFixed(1);
                speedNotif.style.opacity = 1;
                setTimeout(() => { speedNotif.style.opacity = 0; }, 1000);
            }
        }

        // --- 5. INPUT ---
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', () => {
             gameOverScreen.classList.add('hidden');
             startScreen.classList.remove('hidden');
        });
        document.getElementById('pause-btn').addEventListener('click', togglePause);
        document.getElementById('resume-btn').addEventListener('click', togglePause);

        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;

        document.addEventListener('touchstart', (e) => {
            if(gameState !== 'playing') return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            touchStartTime = new Date().getTime();
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if(gameState !== 'playing') return;
            const deltaX = e.changedTouches[0].screenX - touchStartX;
            const deltaY = e.changedTouches[0].screenY - touchStartY;
            const time = new Date().getTime() - touchStartTime;

            if (Math.abs(deltaX) < 30 && Math.abs(deltaY) < 30 && time < 300) doJump();
            else if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 30) changeLane(1); 
                else if (deltaX < -30) changeLane(-1); 
            }
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            if(gameState !== 'playing') return;
            if(e.key === 'ArrowLeft' || e.key === 'a') changeLane(-1);
            if(e.key === 'ArrowRight' || e.key === 'd') changeLane(1);
            if(e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') doJump();
            if(e.key === 'p' || e.key === 'Escape') togglePause();
        });

        function doJump() { if (isGrounded) { velocityY = jumpStrength; isGrounded = false; } }
        function changeLane(dir) { 
            currentLane += dir; 
            if (currentLane < -1) currentLane = -1; 
            if (currentLane > 1) currentLane = 1; 
        }

        // --- 6. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (gameState !== 'playing') return;

            // Movement
            player.position.z -= forwardSpeed;
            score = Math.floor(Math.abs(player.position.z));
            distDisplay.innerText = score + " FT";
            updateSpeed();

            // Camera
            camera.position.z = player.position.z + cameraOffset.z;
            camera.position.y = cameraOffset.y; 
            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            camera.lookAt(player.position.x, player.position.y, player.position.z - 10);
            
            ground.position.z = player.position.z;
            lines.forEach(l => l.position.z = player.position.z);

            // Lane Physics
            const targetX = currentLane * laneWidth;
            player.position.x += (targetX - player.position.x) * 0.2;

            player.position.y += velocityY;
            if (player.position.y > 0.5) {
                velocityY += gravity;
                isGrounded = false;
            } else {
                player.position.y = 0.5;
                velocityY = 0;
                isGrounded = true;
            }

            // Collisions
            playerBox.setFromObject(player); 
            playerBox.expandByScalar(-0.2); // Tighter hit box for cube

            // Obstacle Spawning
            const spawnChance = 0.03 + (speedScale * 0.002);
            if (Math.random() < spawnChance) { 
                const obs = new THREE.Mesh(obstacleGeo, obstacleMat);
                const lane = Math.floor(Math.random() * 3) - 1; 
                const spawnDist = 80 + (speedScale * 2);
                obs.position.set(lane * laneWidth, 1, player.position.z - spawnDist); 
                obs.castShadow = true;
                scene.add(obs);
                obstacles.push(obs);
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                if (obs.position.z > player.position.z + 10) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    continue;
                }
                const obsBox = new THREE.Box3().setFromObject(obs);
                if (playerBox.intersectsBox(obsBox)) {
                    triggerGameOver();
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        FB.init();
        animate();
    </script>
</body>
</html>
