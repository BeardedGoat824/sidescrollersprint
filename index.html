<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON SPRINT | Hyper-Casual Runner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        .particles-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle-bg {
            position: absolute;
            width: 2px; height: 2px;
            background: #00ffff;
            border-radius: 50%;
            opacity: 0.5;
            animation: floatUp 10s infinite;
        }

        @keyframes floatUp {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .main-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex;
            z-index: 10;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        .game-header {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 50%, #00ffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 20px rgba(0,255,255,0.5));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 0.5em;
            color: #00ffff;
            opacity: 0.8;
            margin-top: 5px;
            text-transform: uppercase;
        }

        #gameCanvas {
            border: 2px solid rgba(0,255,255,0.3);
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,255,255,0.2), inset 0 0 50px rgba(0,255,255,0.05);
            background: #0a0a0f;
            display: block;
            touch-action: none;
        }

        #hud {
            position: absolute;
            top: 85px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            pointer-events: none;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #hud.active { opacity: 1; }

        .hud-item {
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 10px;
            padding: 8px 18px;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            min-width: 85px;
        }

        .hud-label {
            font-size: 0.6rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        .panel {
            background: rgba(10,10,20,0.95);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #nameEntry {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            min-width: 380px;
            z-index: 50;
        }

        #playerName {
            width: 100%;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-family: 'Rajdhani', sans-serif;
            background: rgba(0,255,255,0.05);
            border: 2px solid rgba(0,255,255,0.3);
            border-radius: 50px;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        #playerName:focus {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
            background: rgba(0,255,255,0.1);
        }

        #playerName::placeholder { color: rgba(255,255,255,0.3); }

        .btn {
            padding: 15px 50px;
            font-size: 1.1rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #00ffff 0%, #0080ff 100%);
            border: none;
            border-radius: 50px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn:hover::before, .btn:active::before { left: 100%; }

        .btn:hover, .btn:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,255,255,0.4);
        }

        .sidebar {
            width: 300px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid rgba(0,255,255,0.1);
            background: rgba(0,0,0,0.3);
        }

        .leaderboard-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
            color: #ff00ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
        }

        .leaderboard-title::after {
            content: '';
            position: absolute;
            bottom: -10px; left: 50%;
            transform: translateX(-50%);
            width: 50px; height: 2px;
            background: linear-gradient(90deg, transparent, #ff00ff, transparent);
        }

        .score-list { list-style: none; }

        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin: 6px 0;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border-left: 3px solid transparent;
            font-size: 0.85rem;
        }

        .score-item:nth-child(1) { border-left-color: #ffd700; background: rgba(255,215,0,0.1); }
        .score-item:nth-child(2) { border-left-color: #c0c0c0; background: rgba(192,192,192,0.1); }
        .score-item:nth-child(3) { border-left-color: #cd7f32; background: rgba(205,127,50,0.1); }

        .score-rank {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            width: 28px;
        }

        .score-name {
            flex: 1;
            text-align: left;
            margin-left: 10px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #00ffff;
        }

        #gameOver {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s;
            z-index: 60;
            min-width: 350px;
        }

        #gameOver.active {
            opacity: 1;
            pointer-events: all;
            transform: translate(-50%, -50%) scale(1);
        }

        .game-over-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: #ff0066;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(255,0,102,0.5);
        }

        .final-score { font-size: 1.2rem; margin-bottom: 20px; }

        .final-score span {
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            display: block;
            margin-top: 8px;
        }

        .instructions {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .key {
            display: inline-block;
            padding: 4px 12px;
            margin: 0 3px;
            background: rgba(0,255,255,0.1);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 5px;
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .hidden { display: none !important; }

        .loader {
            width: 20px; height: 20px;
            border: 2px solid rgba(0,255,255,0.1);
            border-top-color: #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { display: none; }
            .game-title { font-size: 1.6rem; }
            #nameEntry { min-width: 90%; max-width: 380px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="particles-bg" id="particlesBg"></div>

    <div class="main-wrapper">
        <div class="game-area">
            <div class="game-header">
                <h1 class="game-title">NEON SPRINT</h1>
                <div class="subtitle">Hyper-Casual Runner</div>
            </div>

            <div id="hud">
                <div class="hud-item">
                    <div class="hud-label">Score</div>
                    <div class="hud-value" id="scoreDisplay">0</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">Speed</div>
                    <div class="hud-value" id="speedDisplay">1.0x</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">Best</div>
                    <div class="hud-value" id="bestDisplay">0</div>
                </div>
            </div>

            <div id="nameEntry" class="panel">
                <div style="margin-bottom:20px;font-size:1.1rem;color:rgba(255,255,255,0.8);">
                    Enter your callsign, runner
                </div>
                <div style="margin:25px 0;">
                    <input type="text" id="playerName" placeholder="PLAYER_1" maxlength="15" autocomplete="off">
                </div>
                <button class="btn" id="startBtn">Initialize Run</button>
                <div style="margin-top:18px;font-size:0.75rem;color:rgba(255,255,255,0.35);">
                    <div class="loader"></div>
                    Connecting to global servers...
                </div>
            </div>

            <canvas id="gameCanvas" class="hidden"></canvas>

            <div class="instructions" id="instructions" style="display:none;">
                Use <span class="key">&larr;</span> <span class="key">&rarr;</span> or <span class="key">A</span> <span class="key">D</span> to switch lanes
            </div>

            <div id="gameOver" class="panel">
                <div class="game-over-title">SYSTEM CRASH</div>
                <div class="final-score">Final Score<span id="finalScore">0</span></div>
                <button class="btn" id="restartBtn">Reinitialize</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div class="leaderboard-title">Global Elite</div>
                <ul class="score-list" id="scoreList"></ul>
            </div>
        </div>
    </div>

<script>
(function() {
    // ======================== CONFIG ========================
    const LANE_COUNT = 3;
    const BASE_SPEED = 2.5;
    const SPEED_INCREMENT = 0.0003;
    const MAX_SPEED = 10;
    const OBSTACLE_START_DELAY = 120;   // grace period frames before first obstacle
    const OBSTACLE_INTERVAL_BASE = 100; // frames between obstacles at start
    const OBSTACLE_INTERVAL_MIN = 35;
    const PLAYER_W = 36;
    const PLAYER_H = 52;

    // ======================== DOM ========================
    const canvas  = document.getElementById('gameCanvas');
    const ctx     = canvas.getContext('2d');
    const nameEntry    = document.getElementById('nameEntry');
    const gameOverPanel= document.getElementById('gameOver');
    const hud          = document.getElementById('hud');
    const instructions = document.getElementById('instructions');
    const scoreDisp    = document.getElementById('scoreDisplay');
    const speedDisp    = document.getElementById('speedDisplay');
    const bestDisp     = document.getElementById('bestDisplay');
    const finalScoreEl = document.getElementById('finalScore');
    const startBtn     = document.getElementById('startBtn');
    const restartBtn   = document.getElementById('restartBtn');
    const nameInput    = document.getElementById('playerName');
    const scoreListEl  = document.getElementById('scoreList');

    // ======================== STATE ========================
    let playerName = 'PLAYER_1';
    let running = false;
    let score = 0;
    let speed = BASE_SPEED;
    let best = 0;
    let lane = 1;
    let pX = 0, pY = 0;
    let targetX = 0;
    let obstacles = [];
    let parts = [];
    let trail = [];
    let buildings = [];
    let stars = [];
    let roadOff = 0;
    let frame = 0;
    let nextObs = OBSTACLE_START_DELAY;
    let laneW = 0, roadL = 0, roadR = 0;
    let animId = null;
    let shake = 0, flash = 0;

    // ======================== LEADERBOARD ========================
    const LB_KEY = 'neonSprintLB';
    function getLB() { try { return JSON.parse(localStorage.getItem(LB_KEY)||'[]'); } catch(e){ return []; } }
    function saveLB(lb) { localStorage.setItem(LB_KEY, JSON.stringify(lb)); }
    function addScore(name, sc) {
        let lb = getLB();
        lb.push({name, score: sc});
        lb.sort((a,b)=>b.score-a.score);
        lb = lb.slice(0,10);
        saveLB(lb);
        return lb;
    }
    function renderLB() {
        let lb = getLB();
        scoreListEl.innerHTML = '';
        const data = lb.length ? lb.slice(0,8) : [
            {name:'NEON_KING',score:15420},{name:'CYBER_WOLF',score:12890},
            {name:'GLITCH_99',score:9750},{name:'PHANTOM',score:7200},{name:'NOVA_X',score:5100}
        ];
        data.forEach((e,i)=>{
            const li = document.createElement('li');
            li.className = 'score-item';
            li.innerHTML = `<span class="score-rank">${String(i+1).padStart(2,'0')}</span><span class="score-name">${e.name}</span><span class="score-value">${e.score.toLocaleString()}</span>`;
            scoreListEl.appendChild(li);
        });
        best = lb.length ? lb[0].score : 0;
        bestDisp.textContent = best.toLocaleString();
    }

    // ======================== CANVAS SIZE ========================
    function resize() {
        const maxW = Math.min(800, window.innerWidth - 40);
        const maxH = Math.min(600, window.innerHeight - 170);
        const asp = 4/3;
        let w = maxW, h = w/asp;
        if(h>maxH){ h=maxH; w=h*asp; }
        canvas.width = Math.floor(w);
        canvas.height = Math.floor(h);
        laneW = canvas.width / 5;
        roadL = laneW;
        roadR = canvas.width - laneW;
        pY = canvas.height - 85;
    }

    // ======================== BACKGROUND ========================
    function genBuildings() {
        buildings = [];
        for(let i=0;i<35;i++){
            buildings.push({
                x: Math.random()*1800-500,
                w: 25+Math.random()*55,
                h: 50+Math.random()*200,
                hue: Math.random()>0.5 ? 180+Math.random()*40 : 280+Math.random()*40,
                spd: 0.15+Math.random()*0.35
            });
        }
        buildings.sort((a,b)=>a.spd-b.spd);
    }
    function genStars() {
        stars = [];
        for(let i=0;i<70;i++) stars.push({x:Math.random()*800, y:Math.random()*220, s:0.4+Math.random()*1.5, b:Math.random()*6.28});
    }

    function drawSky() {
        const g = ctx.createLinearGradient(0,0,0,canvas.height*0.45);
        g.addColorStop(0,'#040410');
        g.addColorStop(0.5,'#0a0a2e');
        g.addColorStop(1,'#1a0a2e');
        ctx.fillStyle = g;
        ctx.fillRect(0,0,canvas.width,canvas.height*0.45);
    }

    function drawStars() {
        const cw=canvas.width, ch=canvas.height;
        stars.forEach(s=>{
            const a = 0.3+0.7*Math.abs(Math.sin(s.b+frame*0.018));
            ctx.fillStyle = `rgba(255,255,255,${a})`;
            ctx.beginPath();
            ctx.arc(s.x*cw/800, s.y*ch/600, s.s, 0, Math.PI*2);
            ctx.fill();
        });
    }

    function drawBuildings() {
        const hz = canvas.height*0.38;
        const cw=canvas.width, ch=canvas.height;
        buildings.forEach(b=>{
            let bx = ((b.x - frame*b.spd*speed*0.12) % (cw+300)) - 150;
            if(bx < -100) bx += cw+300;
            const bw = b.w*cw/800;
            const bh = b.h*ch/600*0.5;
            const by = hz - bh;

            ctx.fillStyle = `hsla(${b.hue},60%,7%,0.9)`;
            ctx.fillRect(bx,by,bw,bh);
            ctx.strokeStyle = `hsla(${b.hue},80%,45%,0.25)`;
            ctx.lineWidth = 1;
            ctx.strokeRect(bx,by,bw,bh);

            // windows
            const rows = Math.floor(bh/14);
            const cols = Math.max(1,Math.floor(bw/14));
            for(let r=0;r<rows;r++){
                for(let c=0;c<cols;c++){
                    const wx = bx+3+c*(bw-6)/cols;
                    const wy = by+3+r*14;
                    const lit = ((r*7+c*13+Math.floor(frame*0.005))%5) > 1;
                    ctx.fillStyle = lit ? `hsla(${b.hue},80%,55%,${0.2+Math.random()*0.4})` : 'rgba(0,0,0,0.4)';
                    ctx.fillRect(wx,wy,5,7);
                }
            }
        });
    }

    function drawRoad() {
        const top = canvas.height*0.38;
        const rw = roadR-roadL;

        // surface
        const g = ctx.createLinearGradient(0,top,0,canvas.height);
        g.addColorStop(0,'#0d0d1a');
        g.addColorStop(1,'#1a1a2e');
        ctx.fillStyle = g;
        ctx.fillRect(roadL,top,rw,canvas.height-top);

        // edge glow
        ctx.shadowBlur = 18;
        ctx.shadowColor = '#ff00ff';
        ctx.strokeStyle = '#ff00ff';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(roadL,top); ctx.lineTo(roadL,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(roadR,top); ctx.lineTo(roadR,canvas.height); ctx.stroke();
        ctx.shadowBlur = 0;

        // lane dividers
        const lw = rw/LANE_COUNT;
        ctx.setLineDash([22,22]);
        ctx.lineDashOffset = -roadOff;
        ctx.strokeStyle = 'rgba(0,255,255,0.18)';
        ctx.lineWidth = 1;
        for(let i=1;i<LANE_COUNT;i++){
            const lx = roadL+i*lw;
            ctx.beginPath(); ctx.moveTo(lx,top); ctx.lineTo(lx,canvas.height); ctx.stroke();
        }
        ctx.setLineDash([]);

        // side dashes
        ctx.setLineDash([8,32]);
        ctx.lineDashOffset = -roadOff*1.4;
        ctx.strokeStyle = 'rgba(255,0,255,0.12)';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(roadL+8,top); ctx.lineTo(roadL+8,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(roadR-8,top); ctx.lineTo(roadR-8,canvas.height); ctx.stroke();
        ctx.setLineDash([]);
    }

    // ======================== PLAYER ========================
    function drawPlayer(x,y) {
        const sc = canvas.width/800;
        const w = PLAYER_W*sc, h = PLAYER_H*sc;

        // trail
        trail.push({x,y:y+h*0.3,a:0.8,sz:w*0.35});
        if(trail.length>14) trail.shift();
        trail.forEach((t,i)=>{
            ctx.fillStyle = `rgba(0,255,255,${t.a*0.12})`;
            ctx.beginPath();
            ctx.arc(t.x, t.y+(trail.length-i)*2.5, t.sz*(i/trail.length), 0, Math.PI*2);
            ctx.fill();
            t.a *= 0.88;
        });

        ctx.shadowBlur = 22;
        ctx.shadowColor = '#00ffff';

        // torso
        ctx.fillStyle = '#00ddff';
        ctx.beginPath();
        ctx.moveTo(x, y-h*0.45);
        ctx.lineTo(x-w*0.3, y-h*0.08);
        ctx.lineTo(x-w*0.24, y+h*0.12);
        ctx.lineTo(x+w*0.24, y+h*0.12);
        ctx.lineTo(x+w*0.3, y-h*0.08);
        ctx.closePath();
        ctx.fill();

        // head
        ctx.fillStyle = '#0a0a2e';
        ctx.beginPath();
        ctx.arc(x, y-h*0.43, w*0.22, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // visor
        ctx.fillStyle = '#00ffff';
        ctx.beginPath();
        ctx.ellipse(x, y-h*0.44, w*0.15, w*0.055, 0, 0, Math.PI*2);
        ctx.fill();

        // arms
        const aw = Math.sin(frame*0.3)*4;
        ctx.strokeStyle = '#00ddff';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x-w*0.3,y-h*0.06); ctx.lineTo(x-w*0.48,y+aw); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+w*0.3,y-h*0.06); ctx.lineTo(x+w*0.48,y-aw); ctx.stroke();

        // legs
        const lg = Math.sin(frame*0.35)*8;
        ctx.strokeStyle = '#00bbdd';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x-w*0.12,y+h*0.12); ctx.lineTo(x-w*0.22,y+h*0.36+lg); ctx.lineTo(x-w*0.16,y+h*0.5+lg*0.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+w*0.12,y+h*0.12); ctx.lineTo(x+w*0.22,y+h*0.36-lg); ctx.lineTo(x+w*0.16,y+h*0.5-lg*0.5); ctx.stroke();

        // accent lines
        ctx.strokeStyle = '#ff00ff';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x-w*0.15,y-h*0.3); ctx.lineTo(x-w*0.24,y+h*0.06); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+w*0.15,y-h*0.3); ctx.lineTo(x+w*0.24,y+h*0.06); ctx.stroke();

        ctx.shadowBlur = 0;
    }

    // ======================== OBSTACLES ========================
    const OBS_TYPES = ['barrier','car','drone','spike'];

    function spawnObs() {
        const ln = Math.floor(Math.random()*LANE_COUNT);
        const tp = OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
        const lw = (roadR-roadL)/LANE_COUNT;
        obstacles.push({
            x: roadL+ln*lw+lw/2,
            y: -70,
            lane: ln,
            type: tp,
            w: lw*0.55,
            h: tp==='drone'?28 : tp==='car'?52 : tp==='spike'?24 : 32
        });
    }

    function drawObs(o) {
        const s = canvas.width/800;
        const w = o.w*s, h = o.h*s;
        const x = o.x, y = o.y;
        ctx.shadowBlur = 12;

        if(o.type==='barrier'){
            ctx.shadowColor = '#ff3300';
            ctx.fillStyle = '#1a0808';
            ctx.fillRect(x-w/2,y-h/2,w,h);
            for(let i=0;i<4;i++){
                ctx.fillStyle = i%2===0?'rgba(255,50,0,0.7)':'rgba(255,170,0,0.5)';
                ctx.fillRect(x-w/2+i*w/4,y-h/2,w/4,h);
            }
            ctx.strokeStyle = '#ff6600';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(x-w/2,y-h/2,w,h);
        }
        else if(o.type==='car'){
            ctx.shadowColor = '#ff00ff';
            const bw=w*0.78, bh=h;
            ctx.fillStyle = '#1a0020';
            ctx.beginPath();
            ctx.moveTo(x-bw/2+5,y-bh/2);
            ctx.lineTo(x+bw/2-5,y-bh/2);
            ctx.quadraticCurveTo(x+bw/2,y-bh/2,x+bw/2,y-bh/2+5);
            ctx.lineTo(x+bw/2,y+bh/2-5);
            ctx.quadraticCurveTo(x+bw/2,y+bh/2,x+bw/2-5,y+bh/2);
            ctx.lineTo(x-bw/2+5,y+bh/2);
            ctx.quadraticCurveTo(x-bw/2,y+bh/2,x-bw/2,y+bh/2-5);
            ctx.lineTo(x-bw/2,y-bh/2+5);
            ctx.quadraticCurveTo(x-bw/2,y-bh/2,x-bw/2+5,y-bh/2);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 2;
            ctx.stroke();
            // windshield
            ctx.fillStyle = 'rgba(255,0,255,0.25)';
            ctx.fillRect(x-bw*0.28,y-bh*0.33,bw*0.56,bh*0.18);
            // headlights
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath(); ctx.arc(x-bw*0.28,y+bh*0.35,3*s,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x+bw*0.28,y+bh*0.35,3*s,0,Math.PI*2); ctx.fill();
        }
        else if(o.type==='drone'){
            ctx.shadowColor = '#ffff00';
            const hv = Math.sin(frame*0.15+o.x)*3;
            const dy = y+hv;
            ctx.fillStyle = '#1a1a00';
            ctx.beginPath();
            ctx.ellipse(x,dy,w*0.38,h*0.35,0,0,Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 2;
            ctx.stroke();
            // eye
            ctx.fillStyle = '#ff0000';
            ctx.beginPath(); ctx.arc(x,dy,3*s,0,Math.PI*2); ctx.fill();
            // propellers
            const ps = frame*0.5;
            ctx.strokeStyle = 'rgba(255,255,0,0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(x-w*0.42,dy-h*0.18); ctx.lineTo(x-w*0.42+Math.cos(ps)*10,dy-h*0.38); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x+w*0.42,dy-h*0.18); ctx.lineTo(x+w*0.42+Math.cos(ps+Math.PI)*10,dy-h*0.38); ctx.stroke();
            // arms
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(x-w*0.28,dy); ctx.lineTo(x-w*0.42,dy-h*0.18); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x+w*0.28,dy); ctx.lineTo(x+w*0.42,dy-h*0.18); ctx.stroke();
        }
        else if(o.type==='spike'){
            ctx.shadowColor = '#00ff66';
            const spk = 5;
            ctx.beginPath();
            for(let i=0;i<spk;i++){
                const sx = x-w/2+(i/spk)*w+w/(spk*2);
                ctx.moveTo(sx-w/(spk*2),y+h/2);
                ctx.lineTo(sx,y-h/2);
                ctx.lineTo(sx+w/(spk*2),y+h/2);
            }
            ctx.closePath();
            ctx.fillStyle = '#001a0d';
            ctx.fill();
            ctx.strokeStyle = '#00ff66';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.fillStyle = 'rgba(0,255,100,0.15)';
            ctx.fillRect(x-w/2,y+h*0.28,w,h*0.22);
        }
        ctx.shadowBlur = 0;
    }

    // ======================== PARTICLES ========================
    function boom(x,y,col) {
        for(let i=0;i<10;i++){
            parts.push({x,y,vx:(Math.random()-0.5)*7,vy:(Math.random()-0.5)*7-2,life:1,col:col||'#00ffff',sz:2+Math.random()*4});
        }
    }
    function updateParts() {
        for(let i=parts.length-1;i>=0;i--){
            const p=parts[i];
            p.x+=p.vx; p.y+=p.vy; p.life-=0.03;
            if(p.life<=0) parts.splice(i,1);
        }
    }
    function drawParts() {
        parts.forEach(p=>{
            ctx.globalAlpha = Math.max(0,p.life);
            ctx.fillStyle = p.col;
            ctx.shadowBlur = 8;
            ctx.shadowColor = p.col;
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
    }

    // ======================== COLLISION ========================
    function collides() {
        const sc = canvas.width/800;
        const pw = PLAYER_W*sc*0.4;
        const ph = PLAYER_H*sc*0.35;
        for(const o of obstacles){
            const ow = o.w*sc*0.35;
            const oh = o.h*sc*0.35;
            if(Math.abs(pX-o.x)<pw+ow && Math.abs(pY-o.y)<ph+oh) return true;
        }
        return false;
    }

    function laneX(l) {
        const lw = (roadR-roadL)/LANE_COUNT;
        return roadL+l*lw+lw/2;
    }

    // ======================== GAME LOOP ========================
    function update() {
        frame++;
        speed = Math.min(MAX_SPEED, BASE_SPEED + frame*SPEED_INCREMENT);
        score = Math.floor(frame*speed*0.04);
        roadOff += speed*3;

        targetX = laneX(lane);
        pX += (targetX-pX)*0.15;

        for(let i=obstacles.length-1;i>=0;i--){
            obstacles[i].y += speed*1.4;
            if(obstacles[i].y > canvas.height+80) obstacles.splice(i,1);
        }

        const interval = Math.max(OBSTACLE_INTERVAL_MIN, OBSTACLE_INTERVAL_BASE - frame*0.015);
        if(frame >= nextObs){
            spawnObs();
            nextObs = frame + interval + Math.random()*25;
        }

        if(collides()){ gameOver(); return; }

        if(frame%4===0){
            parts.push({
                x:pX+(Math.random()-0.5)*8,
                y:pY+22,
                vx:(Math.random()-0.5)*0.8,
                vy:1+Math.random()*1.5,
                life:0.5,
                col: Math.random()>0.5?'#00ffff':'#ff00ff',
                sz:1+Math.random()*1.5
            });
        }
        updateParts();
        if(shake>0) shake*=0.88;
        if(flash>0) flash-=0.04;
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.save();
        if(shake>0.5) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);

        drawSky();
        drawStars();
        drawBuildings();
        drawRoad();
        obstacles.forEach(drawObs);
        drawPlayer(pX,pY);
        drawParts();

        ctx.restore();

        if(flash>0){
            ctx.fillStyle = `rgba(255,0,80,${Math.max(0,flash)})`;
            ctx.fillRect(0,0,canvas.width,canvas.height);
        }

        // vignette
        const vig = ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*0.28, canvas.width/2,canvas.height/2,canvas.height*0.82);
        vig.addColorStop(0,'transparent');
        vig.addColorStop(1,'rgba(0,0,0,0.35)');
        ctx.fillStyle = vig;
        ctx.fillRect(0,0,canvas.width,canvas.height);

        scoreDisp.textContent = score.toLocaleString();
        speedDisp.textContent = speed.toFixed(1)+'x';
    }

    function loop() {
        if(!running) return;
        update();
        draw();
        animId = requestAnimationFrame(loop);
    }

    // ======================== GAME STATES ========================
    function startGame() {
        const n = nameInput.value.trim().toUpperCase() || 'PLAYER_1';
        playerName = n;

        nameEntry.classList.add('hidden');
        canvas.classList.remove('hidden');
        hud.classList.add('active');
        instructions.style.display = 'block';
        gameOverPanel.classList.remove('active');

        resize();
        genBuildings();
        genStars();

        score=0; speed=BASE_SPEED; frame=0;
        lane=1; pX=laneX(1); targetX=pX;
        obstacles=[]; parts=[]; trail=[];
        nextObs=OBSTACLE_START_DELAY;
        roadOff=0; shake=0; flash=0;
        running=true;
        loop();
    }

    function gameOver() {
        running = false;
        if(animId) cancelAnimationFrame(animId);

        shake=18; flash=0.7;
        boom(pX,pY,'#ff0066');
        boom(pX,pY,'#00ffff');
        boom(pX,pY,'#ffff00');
        draw();

        const lb = addScore(playerName, score);
        renderLB();
        finalScoreEl.textContent = score.toLocaleString();
        bestDisp.textContent = lb[0].score.toLocaleString();

        setTimeout(()=>{ gameOverPanel.classList.add('active'); }, 500);
    }

    // ======================== INPUT ========================
    document.addEventListener('keydown', e=>{
        if(!running) return;
        if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){
            if(lane>0){ lane--; boom(pX,pY,'#00ffff'); }
            e.preventDefault();
        }
        if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){
            if(lane<LANE_COUNT-1){ lane++; boom(pX,pY,'#00ffff'); }
            e.preventDefault();
        }
    });

    nameInput.addEventListener('keydown', e=>{
        if(e.key==='Enter'){ e.preventDefault(); startGame(); }
    });

    // Touch
    let touchSX = 0;
    canvas.addEventListener('touchstart', e=>{ e.preventDefault(); touchSX=e.touches[0].clientX; }, {passive:false});
    canvas.addEventListener('touchend', e=>{
        e.preventDefault();
        if(!running) return;
        const dx = e.changedTouches[0].clientX - touchSX;
        if(Math.abs(dx)>30){
            if(dx<0 && lane>0){ lane--; boom(pX,pY,'#00ffff'); }
            else if(dx>0 && lane<LANE_COUNT-1){ lane++; boom(pX,pY,'#00ffff'); }
        } else {
            const rect = canvas.getBoundingClientRect();
            const tx = e.changedTouches[0].clientX - rect.left;
            if(tx<rect.width/2 && lane>0){ lane--; boom(pX,pY,'#00ffff'); }
            else if(tx>=rect.width/2 && lane<LANE_COUNT-1){ lane++; boom(pX,pY,'#00ffff'); }
        }
    }, {passive:false});

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', ()=>{ gameOverPanel.classList.remove('active'); startGame(); });

    window.addEventListener('resize', ()=>{ if(running) resize(); });

    // ======================== BG PARTICLES ========================
    (function(){
        const c = document.getElementById('particlesBg');
        for(let i=0;i<20;i++){
            const p = document.createElement('div');
            p.className = 'particle-bg';
            p.style.left = Math.random()*100+'%';
            p.style.animationDelay = Math.random()*10+'s';
            p.style.animationDuration = (8+Math.random()*12)+'s';
            c.appendChild(p);
        }
    })();

    // ======================== INIT ========================
    renderLB();
    nameInput.focus();
})();
</script>
</body>
</html>
