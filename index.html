<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON SPRINT | Hyper-Casual Runner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none; /* Prevent default touch actions */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }

        /* Animated Background Grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ffff;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 10s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Main Layout */
        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            z-index: 10;
        }

        /* Game Area (Left/Center) */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        /* Header */
        .game-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, #00ffff 0%, #ff00ff 50%, #00ffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 0.5em;
            color: #00ffff;
            opacity: 0.8;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Canvas Container */
        .canvas-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #gameCanvas {
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            box-shadow: 
                0 0 50px rgba(0, 255, 255, 0.2),
                inset 0 0 50px rgba(0, 255, 255, 0.05);
            background: radial-gradient(ellipse at center, rgba(20, 20, 40, 0.9) 0%, rgba(0, 0, 0, 0.95) 100%);
            max-width: 100%;
            max-height: 60vh;
            display: block;
            touch-action: none;
        }

        /* Touch Controls Overlay */
        .touch-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .touch-controls.active {
            opacity: 1;
            pointer-events: all;
        }

        .touch-zone {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .touch-zone-left {
            border-right: 1px solid rgba(0, 255, 255, 0.1);
        }

        .touch-zone-right {
            border-left: 1px solid rgba(0, 255, 255, 0.1);
        }

        .touch-zone:active {
            background: rgba(0, 255, 255, 0.1);
        }

        .touch-indicator {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: rgba(0, 255, 255, 0.5);
            transition: all 0.2s;
        }

        .touch-zone:active .touch-indicator {
            border-color: #00ffff;
            color: #00ffff;
            transform: scale(0.9);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        /* Mobile Instructions */
        .mobile-instructions {
            display: none;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        @media (hover: none) and (pointer: coarse) {
            .desktop-instructions {
                display: none;
            }
            .mobile-instructions {
                display: block;
            }
        }

        /* HUD - Inside Game Area */
        #hud {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            pointer-events: none;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #hud.active {
            opacity: 1;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            min-width: 100px;
        }

        .hud-label {
            font-size: 0.7rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        /* Instructions */
        .instructions {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .key {
            display: inline-block;
            padding: 5px 15px;
            margin: 0 5px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 5px;
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }

        /* Sidebar (Right) - Leaderboard */
        .sidebar {
            width: 320px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid rgba(0, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        /* UI Panels */
        .panel {
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* Name Entry - Centered Overlay */
        #nameEntry {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            min-width: 400px;
            z-index: 50;
        }

        .input-group {
            margin: 30px 0;
        }

        #playerName {
            width: 100%;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-family: 'Rajdhani', sans-serif;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50px;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        #playerName:focus {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            background: rgba(0, 255, 255, 0.1);
        }

        #playerName::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn {
            padding: 15px 50px;
            font-size: 1.1rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #00ffff 0%, #0080ff 100%);
            border: none;
            border-radius: 50px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn:hover::before, .btn:active::before {
            left: 100%;
        }

        .btn:hover, .btn:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.4);
        }

        /* Leaderboard */
        .leaderboard-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
            color: #ff00ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
        }

        .leaderboard-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff00ff, transparent);
        }

        .score-list {
            list-style: none;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }

        .score-item:nth-child(1) { border-left-color: #ffd700; background: rgba(255, 215, 0, 0.1); }
        .score-item:nth-child(2) { border-left-color: #c0c0c0; background: rgba(192, 192, 192, 0.1); }
        .score-item:nth-child(3) { border-left-color: #cd7f32; background: rgba(205, 127, 50, 0.1); }

        .score-rank {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            width: 30px;
        }

        .score-name {
            flex: 1;
            text-align: left;
            margin-left: 15px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #00ffff;
        }

        /* Game Over Screen */
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s;
            z-index: 60;
        }

        #gameOver.active {
            opacity: 1;
            pointer-events: all;
            transform: translate(-50%, -50%) scale(1);
        }

        .game-over-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: #ff0066;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 0, 102, 0.5);
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .final-score span {
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            display: block;
            margin-top: 10px;
        }

        /* Loading Animation */
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 255, 0.1);
            border-top-color: #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-wrapper {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid rgba(0, 255, 255, 0.1);
                padding: 20px;
                display: none;
            }
            
            #gameCanvas {
                max-height: 50vh;
                width: 100%;
            }

            .game-title {
                font-size: 1.8rem;
            }

            #nameEntry {
                min-width: 90%;
                max-width: 400px;
            }
        }

        /* Swipe Visual Feedback */
        .swipe-feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #00ffff;
            opacity: 0;
            pointer-events: none;
            z-index: 60;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }

        .swipe-feedback.show {
            animation: swipeAnim 0.5s ease-out;
        }

        @keyframes swipeAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
